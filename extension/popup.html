<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gleam Monitor</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; width: 320px; background: #1a1a2e; color: #eee; margin: 0; }
      h3 { margin: 0 0 16px 0; font-size: 16px; color: #fff; }
      .counter { text-align: center; padding: 20px 0; }
      .counter .number { font-size: 48px; font-weight: bold; color: #10b981; }
      .counter .label { font-size: 14px; color: #888; margin-top: 4px; }
      .btn { width: 100%; padding: 12px 16px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 8px; }
      .btn:hover { background: #059669; }
      .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
      .btn.clear { background: #ef4444; }
      .btn.clear:hover { background: #dc2626; }
      .btn.file { background: #7c3aed; }
      .btn.file:hover { background: #6d28d9; }
      #status { margin-top: 12px; font-size: 12px; color: #888; text-align: center; min-height: 18px; }
      .zero { color: #666; }
      .file-status { font-size: 11px; color: #10b981; text-align: center; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h3>Gleam Link Monitor</h3>
    <div class="counter">
      <div class="number" id="count">0</div>
      <div class="label">entries collected</div>
    </div>
    <button id="fileBtn" class="btn file">Select Output File</button>
    <button id="downloadBtn" class="btn" disabled>Download NDJSON</button>
    <button id="clearBtn" class="btn clear" disabled>Clear All</button>
    <div class="file-status" id="fileStatus"></div>
    <div id="status"></div>
    
    <script src="popup.js"></script>
  </body>
</html>
