<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gleam Monitor</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 16px;
        width: 340px;
        background: #1a1a2e;
        color: #eee;
      }
      h3 { font-size: 16px; color: #fff; margin-bottom: 12px; }

      /* ── Counter ── */
      .counter { text-align: center; padding: 16px 0 8px; }
      .counter .number { font-size: 48px; font-weight: bold; color: #10b981; }
      .counter .label { font-size: 13px; color: #888; margin-top: 2px; }
      .counter .sub { font-size: 12px; color: #7c3aed; margin-top: 4px; }

      /* ── Buttons ── */
      .btn-row { display: flex; gap: 8px; margin-top: 8px; }
      .btn {
        flex: 1;
        padding: 10px 8px;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
      }
      .btn:hover { filter: brightness(1.1); }
      .btn:disabled { background: #333 !important; color: #555; cursor: not-allowed; filter: none; }
      .btn.green { background: #10b981; }
      .btn.purple { background: #7c3aed; }
      .btn.red { background: #ef4444; }

      /* ── Settings section ── */
      .settings { margin-top: 14px; border-top: 1px solid #2a2a4a; padding-top: 10px; }
      .settings label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
      .settings input[type="number"] {
        width: 56px;
        padding: 4px 6px;
        background: #2a2a4a;
        border: 1px solid #444;
        border-radius: 4px;
        color: #eee;
        font-size: 12px;
        text-align: center;
      }
      .settings input[type="number"]:focus { outline: none; border-color: #7c3aed; }
      .settings .setting-row { margin-bottom: 6px; }
      .settings input[type="checkbox"] {
        accent-color: #7c3aed;
        width: 14px;
        height: 14px;
        cursor: pointer;
      }

      /* ── Auto-entry stats ── */
      .entry-stats { margin-top: 12px; border-top: 1px solid #2a2a4a; padding-top: 10px; }
      .entry-stats h4 { font-size: 12px; color: #888; margin-bottom: 6px; }
      .entry-stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
        margin-bottom: 8px;
      }
      .entry-stat-box {
        text-align: center;
        padding: 8px 4px;
        background: #2a2a4a;
        border-radius: 6px;
      }
      .entry-stat-box .val { font-size: 18px; font-weight: 700; }
      .entry-stat-box .val.green { color: #10b981; }
      .entry-stat-box .val.red { color: #ef4444; }
      .entry-stat-box .val.purple { color: #7c3aed; }
      .entry-stat-box .lbl { font-size: 10px; color: #666; margin-top: 2px; }
      .entry-stats .last-entry { font-size: 10px; color: #555; margin-top: 4px; }
      .entry-stats .last-entry a { color: #7c3aed; text-decoration: none; }
      .entry-stats .reset-link {
        font-size: 10px; color: #555; cursor: pointer; text-align: right;
        margin-top: 4px;
        background: none; border: none; padding: 0; display: block;
        margin-left: auto; font-family: inherit;
      }
      .entry-stats .reset-link:hover { color: #ef4444; }
      .entry-stats .reset-link:focus-visible {
        outline: 1px solid #7c3aed; outline-offset: 2px; border-radius: 2px;
      }

      /* ── Recent links ── */
      .recent { margin-top: 12px; border-top: 1px solid #2a2a4a; padding-top: 10px; }
      .recent h4 { font-size: 12px; color: #888; margin-bottom: 6px; }
      .recent-list { max-height: 120px; overflow-y: auto; }
      .recent-item {
        font-size: 11px;
        padding: 4px 0;
        border-bottom: 1px solid #1f1f3a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .recent-item a { color: #7c3aed; text-decoration: none; }
      .recent-item a:hover { text-decoration: underline; }
      .recent-item .page { color: #555; font-size: 10px; }
      .recent-empty { font-size: 11px; color: #555; font-style: italic; }

      /* ── Status ── */
      #status { margin-top: 10px; font-size: 12px; color: #888; text-align: center; min-height: 16px; }

      /* ── Sync indicator ── */
      .sync-status {
        font-size: 11px;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .sync-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        display: inline-block;
      }
      .sync-dot.connected { background: #10b981; }
      .sync-dot.disconnected { background: #ef4444; }

      /* ── DB total ── */
      .db-total {
        text-align: center;
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      .db-total .db-num { color: #7c3aed; font-weight: 700; }
    </style>
  </head>
  <body>
    <h3>Gleam Link Monitor</h3>

    <div class="counter">
      <div class="number" id="count" aria-label="Entries collected" aria-live="polite">0</div>
      <div class="label">entries collected</div>
      <div class="sub" id="unexported" aria-live="polite"></div>
      <div class="sync-status" id="syncStatus" aria-live="polite"></div>
      <div class="db-total" id="dbTotal" aria-live="polite"></div>
    </div>

    <div class="btn-row">
      <button id="exportNewBtn" class="btn purple" disabled>Export New</button>
      <button id="downloadBtn" class="btn green" disabled>Download All</button>
    </div>
    <div class="btn-row">
      <button id="clearBtn" class="btn red" disabled>Clear All</button>
    </div>

    <div class="entry-stats" id="entryStatsSection">
      <h4>Auto-Entry Stats</h4>
      <div class="entry-stats-grid">
        <div class="entry-stat-box">
          <div class="val purple" id="statTotal">0</div>
          <div class="lbl">Total</div>
        </div>
        <div class="entry-stat-box">
          <div class="val green" id="statCompleted">0</div>
          <div class="lbl">Completed</div>
        </div>
        <div class="entry-stat-box">
          <div class="val red" id="statFailed">0</div>
          <div class="lbl">Failed</div>
        </div>
      </div>
      <div class="last-entry" id="lastEntry"></div>
      <button type="button" class="reset-link" id="resetStats">Reset stats</button>
    </div>

    <div class="settings">
      <div class="setting-row">
        <label>
          <input type="checkbox" id="prefetchToggle" checked />
          Auto-fetch deadlines in background
        </label>
      </div>
      <div class="setting-row">
        <label>
          Auto-export every
          <input type="number" id="thresholdInput" min="0" max="9999" value="0" />
          links (0 = off)
        </label>
      </div>
    </div>

    <div class="recent">
      <h4>Recent links</h4>
      <div class="recent-list" id="recentList">
        <div class="recent-empty">No links yet</div>
      </div>
    </div>

    <div id="status" role="status" aria-live="polite"></div>

    <script src="popup.js"></script>
  </body>
</html>
